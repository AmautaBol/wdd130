<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML and CSS Quiz</title>
    <meta name="description" content="Basic HTML and CSS quiz form to test fundamental knowledge">
    <meta name="author" content="Giancarlo Teran Olguin">
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <main>
        <h1>📝 HTML and CSS Quiz</h1>
        <form>
   
            <div class="form-group">
                <label for="q1">1. What does the acronym "HTML" stand for?</label>
                <input type="text" id="q1" name="q1" placeholder="e.g., Hyper Text Markup Language">
            </div>

            <div class="form-group">
                <label for="q2">2. Briefly explain the purpose of CSS in web development.</label>
                <textarea id="q2" name="q2" rows="4" placeholder="CSS is used to..."></textarea>
            </div>

            <div class="form-group">
                <label for="q3">3. Which of the following is the correct CSS syntax to select an element by its ID?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose one...</option>
                    <option value="class">.classname</option>
                    <option value="id">#idname</option>
                    <option value="element">elementname</option>
                </select>
            </div>

            <div class="form-group">
                <label for="q4">4. How many heading levels (from &lt;h1&gt; to &lt;h6&gt;) are defined in HTML?</label>
                <input type="number" id="q4" name="q4" min="1" max="6">
            </div>

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>
</html>
